x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

# Configuracion base compartida entre hermes (CPU) y hermes-gpu.
# Mismo volumen sti_ollama => los modelos descargados persisten al cambiar de perfil.
# Mismo hostname DNS 'hermes' => apollo sigue usando OLLAMA_URL=http://hermes:11434 sin cambios.
# OJO: ambos pueden coexistir levantados, pero no se debe invocar inferencia en los dos
# a la vez porque comparten el directorio de modelos y se corrompe el estado.
x-hermes-base: &hermes-base
  image: ollama/ollama:latest
  volumes:
    - sti_ollama:/root/.ollama
    - ./scripts:/scripts:ro
  environment:
    - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:--1}
    - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-1}
  restart: unless-stopped
  healthcheck:
    test: ["CMD", "ollama", "list"]
    interval: 10s
    timeout: 5s
    start_period: 30s
    retries: 30
  logging: *default-logging

services:
  atlas:
    image: postgres:16
    container_name: sti-atlas
    profiles: ["cpu", "gpu"]
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
      SEED_DEMO: ${SEED_DEMO:-false}
    ports:
      - "${DB_HOST_PORT:-5433}:5432"
    volumes:
      - sti_pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    logging: *default-logging

  # Modo CPU (perfil por defecto)
  hermes:
    <<: *hermes-base
    container_name: sti-hermes
    profiles: ["cpu"]

  # Modo GPU (requiere nvidia-container-toolkit + driver NVIDIA en el host).
  # Mismo hostname DNS que 'hermes' (el nombre corto del servicio NO es DNS;
  # quien resuelve es el alias, que aqui igualamos via network_mode implicito
  # = mismo network, pero el hostname diferira). Para que apollo no tenga que
  # cambiar su OLLAMA_URL, usamos 'links-style' via aliases en la red default.
  hermes-gpu:
    <<: *hermes-base
    container_name: sti-hermes-gpu
    profiles: ["gpu"]
    networks:
      default:
        aliases:
          - hermes
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  prometheus:
    image: ollama/ollama:latest
    container_name: sti-prometheus
    profiles: ["cpu", "gpu"]
    depends_on:
      hermes:
        condition: service_healthy
        required: false
      hermes-gpu:
        condition: service_healthy
        required: false
    environment:
      OLLAMA_HOST: http://hermes:11434
    entrypoint: ["/bin/sh", "-c"]
    command: >
      ollama list | grep -q "${LLM_MODEL:-qwen2.5:7b-instruct}"
      && echo "Model ${LLM_MODEL:-qwen2.5:7b-instruct} already exists, skipping pull."
      || (echo "Pulling model ${LLM_MODEL:-qwen2.5:7b-instruct}..." && ollama pull "${LLM_MODEL:-qwen2.5:7b-instruct}" && echo "Model ready.")
    volumes:
      - sti_ollama:/root/.ollama
      - ./scripts:/scripts:ro
    restart: "no"
    logging: *default-logging

  apollo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sti-apollo
    profiles: ["cpu", "gpu"]
    depends_on:
      atlas:
        condition: service_healthy
      prometheus:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${APP_PORT:-3000}
      ACCESS_ENABLED: ${ACCESS_ENABLED}
      ACCESS_TOKEN: ${ACCESS_TOKEN}
      ACCESS_SESSION_HOURS: ${ACCESS_SESSION_HOURS}
      OLLAMA_URL: ${OLLAMA_URL:-http://hermes:11434}
      LLM_MODEL: ${LLM_MODEL}
      LLM_TIMEOUT_MS: ${LLM_TIMEOUT_MS}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8080}
    ports:
      - "${APP_PORT:-3000}:3000"
    restart: unless-stopped
    logging: *default-logging

volumes:
  sti_pgdata:
    name: sti_pgdata
  sti_ollama:
    name: sti_ollama
