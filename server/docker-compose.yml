x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  atlas:
    image: postgres:16
    container_name: sti-atlas
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - sti_pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    logging: *default-logging

  hermes:
    image: ollama/ollama:latest
    container_name: sti-hermes
    volumes:
      - sti_ollama:/root/.ollama
      - ./scripts:/scripts:ro
    environment:
      - OLLAMA_KEEP_ALIVE=-1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 30
    logging: *default-logging

  prometheus:
    image: ollama/ollama:latest
    container_name: sti-prometheus
    depends_on:
      hermes:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://hermes:11434
    entrypoint: ["/bin/sh", "-c"]
    command: >
      ollama list | grep -q "${LLM_MODEL:-qwen2.5:7b-instruct}"
      && echo "Model ${LLM_MODEL:-qwen2.5:7b-instruct} already exists, skipping pull."
      || (echo "Pulling model ${LLM_MODEL:-qwen2.5:7b-instruct}..." && ollama pull "${LLM_MODEL:-qwen2.5:7b-instruct}" && echo "Model ready.")
    volumes:
      - sti_ollama:/root/.ollama
      - ./scripts:/scripts:ro
    restart: "no"
    logging: *default-logging

  apollo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sti-apollo
    depends_on:
      atlas:
        condition: service_healthy
      prometheus:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${APP_PORT:-3000}
      ACCESS_ENABLED: ${ACCESS_ENABLED}
      ACCESS_TOKEN: ${ACCESS_TOKEN}
      ACCESS_SESSION_HOURS: ${ACCESS_SESSION_HOURS}
      OLLAMA_URL: ${OLLAMA_URL:-http://hermes:11434}
      LLM_MODEL: ${LLM_MODEL}
      LLM_TIMEOUT_MS: ${LLM_TIMEOUT_MS}
      LLM_TEMPERATURE: ${LLM_TEMPERATURE}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8080}
    ports:
      - "${APP_PORT:-3000}:3000"
    restart: unless-stopped
    logging: *default-logging

volumes:
  sti_pgdata:
    name: sti_pgdata
  sti_ollama:
    name: sti_ollama
